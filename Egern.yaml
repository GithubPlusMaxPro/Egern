ipv6: false
allow_external_connections: true
vif_only: true
block_quic: true
hide_vpn_icon: false
geoip_db_url: https://github.com/xream/geoip/releases/latest/download/ipinfo.country.mmdb
asn_db_url: https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-ASN.mmdb
proxy_latency_test_url: https://connectivitycheck.gstatic.com/generate_204
direct_latency_test_url: https://www.qq.com
udp_latency_test_url: google.com@8.8.8.8
compat_route: true
dns:
  bootstrap:
  - 223.5.5.5
  upstreams:
    国外dns:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
    国内dns:
    - https://223.6.6.6/dns-query
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    兜底dns:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  forward:
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/direct.txt
      value: 国内dns
      disabled: false
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/GMOogway/shadowrocket-rules/master/sr_direct_list.module
      value: 国内dns
      disabled: false
  - domain_wildcard:
      match: '*.cn'
      value: 国内dns
      disabled: false
  - domain_wildcard:
      match: '*'
      value: 兜底dns
      disabled: false
  proxy_nameservers:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
  - https://cloudflare-dns.com/dns-query
  - https://dns.google/dns-query
policy_groups:
- conditional:
    name: 自动选择
    rules:
    - ssid:
        match: CMCC_5G
        policy: DIRECT
    default_policy: 手动选择
    icon: https://iili.io/K0KrBdQ.png
    hidden: false
- select:
    name: 手动选择
    policies: []
    flatten: true
    block_quic: true
    icon: https://iili.io/K0KvJv1.png
    hidden: false
- smart:
    name: 香港节点
    policies:
    - 手动选择
    flatten: true
    filter: 🇭🇰|Hong Kong|Hong|HK|HKG|香港
    block_quic: true
    icon: https://iili.io/FaAI3Bt.png
    hidden: false
- smart:
    name: 新国节点
    policies:
    - 手动选择
    flatten: true
    filter: 🇸🇬|新加坡|Singapore|SG
    icon: https://iili.io/FaRfFXn.png
