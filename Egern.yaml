# 是否启用 IPv6。默认值是 false
ipv6: true
# 允许外部连接通过 Wi-Fi 访问设备上的代理。默认值是 false
allow_external_connections: true
# 仅虚拟网接口模式。默认值是 false
vif_only: true
# 全局阻止 QUIC 协议，强制使用 TCP 连接。默认值是 false
# 优先级：代理 > 策略组 > 全局。代理自身的 block_quic 优先级最高，
# 其次是策略组的 block_quic，最后是此全局设置。
# 若三者均未设置，则使用协议默认值（TCP 类协议默认阻止，UDP 类协议默认放行）。
block_quic: true
# 隐藏 VPN 图标。默认值是 false
hide_vpn_icon: false
geoip_db_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country-without-asn.mmdb
asn_db_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-ASN.mmdb
proxy_latency_test_url: https://connectivitycheck.gstatic.com/generate_204
direct_latency_test_url: http://wifi.vivo.com.cn/generate_204
udp_latency_test_url: google.com@8.8.8.8
# 兼容路由模式。默认值是 false
compat_route: false
dns:
  bootstrap:
  - 223.5.5.5
  upstreams:
    国外dns:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
    国内dns:
    - https://223.6.6.6/dns-query
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    兜底dns:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  forward:
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/direct.txt
      value: 国内dns
      disabled: false
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/GMOogway/shadowrocket-rules/master/sr_direct_list.module
      value: 国内dns
      disabled: false
  - domain_wildcard:
      match: '*.cn'
      value: 国内dns
      disabled: false
  - domain_wildcard:
      match: '*'
      value: 兜底dns
      disabled: false
  proxy_nameservers:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
  - https://cloudflare-dns.com/dns-query
  - https://dns.google/dns-query
policy_groups:
- conditional:
    name: 自动选择
    rules:
    - cellular:
        match: ''
        policy: 手动选择
    - ssid:
        match: CMCC_5G
        policy: DIRECT
    default_policy: 手动选择
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png
    hidden: false
- select:
    name: 手动选择
    policies: []
    flatten: true
    block_quic: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Available.png
    hidden: false
