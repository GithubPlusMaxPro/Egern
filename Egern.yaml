- smart:
    name: 美国节点
    policies:
    - 手动选择
    flatten: true
    filter: 🇺🇸|美国|United States|USA|US|States
    icon: https://iili.io/FaAug7s.png
    hidden: false
- smart:
    name: 荷兰节点
    policies:
    - 手动选择
    flatten: true
    filter: 🇳🇱|荷兰|NLD|NL
    hidden: false
- smart:
    name: 英国节点
    policies:
    - 手动选择
    flatten: true
    filter: ^(?!.*剩余流量).*?(?:🇬🇧|英国|GBR|GB|EN)
