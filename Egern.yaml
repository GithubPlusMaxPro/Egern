ipv6: true
allow_external_connections: true
vif_only: true
block_quic: true
hide_vpn_icon: false
geoip_db_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country-without-asn.mmdb
asn_db_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-ASN.mmdb
proxy_latency_test_url: https://connectivitycheck.gstatic.com/generate_204
direct_latency_test_url: http://wifi.vivo.com.cn/generate_204
udp_latency_test_url: google.com@8.8.8.8
compat_route: false
dns:
  bootstrap:
  - 223.5.5.5
  upstreams:
    国外dns:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
    国内dns:
    - https://223.6.6.6/dns-query
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    兜底dns:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  forward:
  - ssid:
      match: CMCC_5G
      value: 192.168.100.1
      disabled: false
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/direct.txt
      value: 国内dns
      disabled: false
  - proxy_rule_set:
      match: https://raw.githubusercontent.com/GMOogway/shadowrocket-rules/master/sr_direct_list.module
      value: 国内dns
      disabled: false
  - domain_wildcard:
      match: '*.cn'
      value: 国内dns
      disabled: false
  - domain_wildcard:
      match: '*'
      value: 兜底dns
      disabled: false
  proxy_nameservers:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
  - https://cloudflare-dns.com/dns-query
  - https://dns.google/dns-query
policy_groups:
- external:
    name: 订阅列表
    type: select
    urls:
    - https:/多多地址
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Available.png
    hidden: false
- conditional:
    name: 模式选择
    rules:
    - cellular:
        match: ''
        policy: 手动选择
    - ssid:
        match: CMCC_5G
        policy: DIRECT
    default_policy: 手动选择
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png
    hidden: false
- select:
    name: 手动选择
    policies:
    - AI
    - 荷兰节点
    - 美国节点
    - 韩国节点
    - 日本节点
    - 台湾节点
    - 新国节点
    - 香港节点
    flatten: true
    block_quic: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Available.png
    hidden: false
- select:
    name: 香港节点
    policies:
    - 订阅列表
    flatten: true
    filter: 🇭🇰|Hong Kong|Hong|HK|HKG|香港
    block_quic: true
    icon: https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
    hidden: false
- select:
